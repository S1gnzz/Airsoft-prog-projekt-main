<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airsoft — Log ind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f0b;
      --surface: #141810;
      --surface2: #1c2118;
      --border: #2a3025;
      --accent: #7ab648;
      --accent-dim: #4a7028;
      --red: #c0392b;
      --text: #c8d4b8;
      --text-dim: #6b7a5e;
      --text-bright: #eaf2d7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(122,182,72,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(122,182,72,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .login-box {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      margin: 2rem;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .logo span {
      color: var(--text-dim);
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      font-family: 'Share Tech Mono', monospace;
      display: block;
      margin-bottom: 2rem;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .auth-tab {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0.6rem 1rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      transition: all 0.2s;
    }

    .auth-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1rem;
    }

    label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-bright);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus { border-color: var(--accent-dim); }

    .btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 11px 20px;
      border: 1px solid var(--accent-dim);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-top: 0.5rem;
    }

    .btn:hover { background: var(--accent); color: var(--bg); }

    .msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 10px 12px;
      margin-top: 1rem;
      display: none;
    }

    .msg.error { color: var(--red); border: 1px solid #7a2020; background: rgba(192,57,43,0.1); }
    .msg.success { color: var(--accent); border: 1px solid var(--accent-dim); background: rgba(122,182,72,0.1); }
    .msg.show { display: block; }
  </style>
</head>
<body>

<div class="login-box">
  <div class="logo">
    AIRSOFT
    <span>// IDENTIFICER DIG</span>
  </div>

  <div class="auth-tabs">
    <button class="auth-tab active" onclick="skiftTab('login', this)">Log ind</button>
    <button class="auth-tab" onclick="skiftTab('opret', this)">Opret konto</button>
  </div>

  <!-- LOG IND -->
  <div class="auth-panel active" id="panel-login">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="din@email.dk">
    </div>
    <div class="field">
      <label>Kodeord</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') logInd()">
    </div>
    <button class="btn" onclick="logInd()">Log ind</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- OPRET KONTO -->
  <div class="auth-panel" id="panel-opret">
    <div class="field">
      <label>Navn</label>
      <input type="text" id="opret-navn" placeholder="Dit fulde navn">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="opret-email" placeholder="din@email.dk">
    </div>
    <div class="field">
      <label>Kodeord</label>
      <input type="password" id="opret-password" placeholder="Min. 6 tegn" onkeydown="if(event.key==='Enter') opretKonto()">
    </div>
    <button class="btn" onclick="opretKonto()">Opret konto</button>
    <div class="msg" id="opret-msg"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = 'https://tndnbeuzulxbsiyrwtea.supabase.co'
const SUPABASE_KEY = 'sb_publishable_Temis8liudKBnUVCoifUCA_nVRNmNDs' // ← indsæt din nøgle
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

// Hvis allerede logget ind — send videre
const { data: { session } } = await supabase.auth.getSession()
if (session) {
  const { data: profil } = await supabase
    .from('profiles')
    .select('rolle')
    .eq('id', session.user.id)
    .single()
  if (profil?.rolle === 'admin') {
    window.location.href = 'index.html'
  } else {
    window.location.href = 'kunde.html'
  }
}

// ── TABS ───────────────────────────────────────────────
window.skiftTab = function(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'))
  el.classList.add('active')
  document.getElementById('panel-' + tab).classList.add('active')
}

// ── LOG IND ────────────────────────────────────────────
window.logInd = async function() {
  const email    = document.getElementById('login-email').value.trim()
  const password = document.getElementById('login-password').value
  const msg      = document.getElementById('login-msg')

  if (!email || !password) { showMsg(msg, 'Udfyld email og kodeord', 'error'); return }

  const { data, error } = await supabase.auth.signInWithPassword({ email, password })

  if (error) { showMsg(msg, error.message, 'error'); return }

  // Hent rolle og send videre
  const { data: profil } = await supabase
    .from('profiles')
    .select('rolle')
    .eq('id', data.user.id)
    .single()

  if (profil?.rolle === 'admin') {
    window.location.href = 'index.html'
  } else {
    window.location.href = 'kunde.html'
  }
}

// ── OPRET KONTO ────────────────────────────────────────
window.opretKonto = async function() {
  const navn     = document.getElementById('opret-navn').value.trim()
  const email    = document.getElementById('opret-email').value.trim()
  const password = document.getElementById('opret-password').value
  const msg      = document.getElementById('opret-msg')

  if (!navn || !email || !password) { showMsg(msg, 'Udfyld alle felter', 'error'); return }
  if (password.length < 6)          { showMsg(msg, 'Kodeord skal være min. 6 tegn', 'error'); return }

  const { data, error } = await supabase.auth.signUp({ email, password })

  if (error) { showMsg(msg, error.message, 'error'); return }

  // Gem navn og rolle i profiles
  await supabase.from('profiles').insert({
    id: data.user.id,
    navn,
    rolle: 'kunde'
  })

  showMsg(msg, '✓ Konto oprettet! Tjek din email for at bekræfte kontoen.', 'success')
}

// ── HELPER ─────────────────────────────────────────────
function showMsg(el, tekst, type) {
  el.textContent = tekst
  el.className = `msg ${type} show`
}
</script>
</body>
</html>
