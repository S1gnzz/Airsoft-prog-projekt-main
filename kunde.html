<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airsoft — Tilmeld & Lej</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f0b;
      --surface: #141810;
      --surface2: #1c2118;
      --border: #2a3025;
      --accent: #7ab648;
      --accent-dim: #4a7028;
      --red: #c0392b;
      --text: #c8d4b8;
      --text-dim: #6b7a5e;
      --text-bright: #eaf2d7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(122,182,72,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(122,182,72,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,15,11,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 1rem;
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-right: auto;
    }

    .nav-logo span {
      color: var(--text-dim);
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      font-family: 'Share Tech Mono', monospace;
    }

    #nav-bruger {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .tabs {
      position: relative;
      z-index: 1;
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }

    .tab {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 1rem 1.5rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    main {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--text-bright);
      margin-bottom: 1.5rem;
    }

    .section-title span {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.3em;
      margin-bottom: 4px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: var(--accent-dim); }

    .card-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      color: var(--text-bright);
      margin-bottom: 0.75rem;
    }

    .card-meta {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin: 0.75rem 0 1rem;
      line-height: 1.6;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border: 1px solid;
      display: inline-block;
    }

    .badge-green { color: var(--accent); border-color: var(--accent-dim); }
    .badge-red   { color: var(--red);    border-color: #7a2020; }
    .badge-dim   { color: var(--text-dim); border-color: var(--border); }

    .btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 9px 18px;
      border: 1px solid var(--accent-dim);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-full { width: 100%; }

    .bane-pill {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      background: var(--surface2);
      border: 1px solid var(--accent-dim);
      padding: 3px 10px;
      display: inline-block;
      margin: 6px 0;
    }

    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
    }

    /* Kvittering modal */
    #kvittering-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    #kvittering-overlay.show { display: flex; }

    .kvittering-box {
      background: var(--surface);
      border: 1px solid var(--accent-dim);
      border-top: 3px solid var(--accent);
      padding: 2.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    .kvittering-icon { font-size: 2.5rem; margin-bottom: 1rem; }

    .kvittering-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .kvittering-body {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }

    .kvittering-name { font-size: 1rem; color: var(--text-bright); }

    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--accent-dim);
      border-left: 3px solid var(--accent);
      color: var(--text-bright);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      padding: 12px 20px;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">AIRSOFT <span>// PORTAL</span></div>
  <span id="nav-bruger"></span>
  <button class="btn" style="padding:6px 14px;font-size:0.7rem" onclick="logUd()">Log ud</button>
</nav>

<div class="tabs"> <div style="position:relative;z-index:1;padding:1rem 2rem;border-bottom:1px solid var(--border)">
  <div id="medlemskab-status"></div>
</div>
  <button class="tab active" onclick="skiftTab('events', this)">Events</button>
  <button class="tab" onclick="skiftTab('udstyr', this)">Lej Udstyr</button>
</div>

<main>

  <div class="tab-content active" id="tab-events">
    <div class="section-title" style="margin-top:0.5rem">
      <span>// KOMMENDE OPERATIONER</span>
      Events
    </div>
    <div class="cards" id="kunde-events-list">
      <div class="empty">LOADER EVENTS...</div>
    </div>
  </div>

  <div class="tab-content" id="tab-udstyr">
    <div class="section-title" style="margin-top:0.5rem">
      <span>// TILGÆNGELIGT ARSENAL</span>
      Lej Udstyr
    </div>
    <div class="cards" id="kunde-udstyr-list">
      <div class="empty">LOADER UDSTYR...</div>
    </div>
  </div>

</main>

<div id="kvittering-overlay">
  <div class="kvittering-box">
    <div class="kvittering-icon">✓</div>
    <div class="kvittering-title" id="kv-title">BEKRÆFTET</div>
    <div class="kvittering-body" id="kv-body"></div>
    <button class="btn btn-full" onclick="lukKvittering()">Luk</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = 'https://tndnbeuzulxbsiyrwtea.supabase.co'
const SUPABASE_KEY = 'sb_publishable_Temis8liudKBnUVCoifUCA_nVRNmNDs' // ← indsæt din nøgle
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

// ── AUTH GUARD ─────────────────────────────────────────
const { data: { session } } = await supabase.auth.getSession()
if (!session) {
  window.location.href = 'login.html'
}

const { data: profil } = await supabase
  .from('profiles')
  .select('rolle, navn')
  .eq('id', session.user.id)
  .single()

// Admins sendes til arrangørsiden
if (profil?.rolle === 'admin') {
  window.location.href = 'index.html'
}

const aktivtNavn = profil?.navn || session.user.email
document.getElementById('nav-bruger').textContent = '// ' + aktivtNavn.toUpperCase()

window.logUd = async function() {
  await supabase.auth.signOut()
  window.location.href = 'login.html'
}

// ── TABS ───────────────────────────────────────────────
window.skiftTab = function(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  document.getElementById('tab-' + tab).classList.add('active')
}

// ── EVENTS ─────────────────────────────────────────────
async function loadEvents() {
  const { data, error } = await supabase
    .from('events')
    .select('*')
    .order('dato')

  if (error) { console.error(error); return }

  const container = document.getElementById('kunde-events-list')

  if (!data.length) {
    container.innerHTML = '<div class="empty">INGEN KOMMENDE EVENTS</div>'
    return
  }

  container.innerHTML = data.map(ev => {
    const dato = ev.dato ? new Date(ev.dato).toLocaleDateString('da-DK', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    }) : '—'

    return `
      <div class="card">
        <div class="card-label">// OPERATION</div>
        <div class="card-title">${ev.titel || 'Unavngivet event'}</div>
        <div class="card-meta">📅 ${dato}</div>
        <div class="card-meta">📍 ${ev.lokation || '—'}</div>
        ${ev.bane ? `<div><span class="bane-pill">⚔ ${ev.bane}</span></div>` : ''}
        ${ev.antal_spillere ? `<div class="card-meta">👥 Maks ${ev.antal_spillere} spillere</div>` : ''}
        <div class="card-desc">${ev.beskrivelse || 'Ingen beskrivelse endnu.'}</div>
        <div class="card-footer">
          <button class="btn" onclick="tilmeldEvent(${ev.id}, '${(ev.titel||'').replace(/'/g,"\\'")}')">
            Tilmeld mig
          </button>
        </div>
      </div>
    `
  }).join('')
}

window.tilmeldEvent = async function(eventId, eventTitel) {
  // Tjek om spilleren allerede er tilmeldt
  const { data: existing } = await supabase
    .from('spillere')
    .select('id, tilmeldt')
    .ilike('navn', aktivtNavn)
    .single()

  if (existing?.tilmeldt) {
    toast('Du er allerede tilmeldt et event!')
    return
  }

  if (existing) {
    await supabase.from('spillere').update({ tilmeldt: true }).eq('id', existing.id)
  } else {
    await supabase.from('spillere').insert({ navn: aktivtNavn, medlem: false, tilmeldt: true })
  }

  visKvittering(
    'TILMELDT!',
    `Navn: <span class="kvittering-name">${aktivtNavn}</span><br>Event: <span class="kvittering-name">${eventTitel}</span><br><br>Vis dit navn ved check-in.`
  )
}

// ── UDSTYR ─────────────────────────────────────────────
async function loadUdstyr() {
  const { data, error } = await supabase
    .from('udstyr')
    .select('*')
    .eq('lejet', false)
    .neq('tilstand', 'Defekt')
    .order('navn')

  if (error) { console.error(error); return }

  const container = document.getElementById('kunde-udstyr-list')

  if (!data.length) {
    container.innerHTML = '<div class="empty">INTET UDSTYR TILGÆNGELIGT I ØJEBLIKKET</div>'
    return
  }

  container.innerHTML = data.map(u => `
    <div class="card">
      <div class="card-label">// ${(u.type || 'UDSTYR').toUpperCase()}</div>
      <div class="card-title">${u.navn}</div>
      <div class="card-meta">
        <span class="badge badge-green">TILGÆNGELIGT</span>
        <span class="badge badge-dim">${u.tilstand}</span>
      </div>
      <div class="card-footer">
        <button class="btn" onclick="lejUdstyr(${u.id}, '${u.navn.replace(/'/g,"\\'")}')">
          Lej dette
        </button>
      </div>
    </div>
  `).join('')
}

window.lejUdstyr = async function(id, navn) {
  const { error } = await supabase
    .from('udstyr')
    .update({ lejet: true, lejet_af: aktivtNavn })
    .eq('id', id)

  if (error) { toast('FEJL: ' + error.message); return }

  visKvittering(
    'UDSTYR LEJET!',
    `Navn: <span class="kvittering-name">${aktivtNavn}</span><br>Udstyr: <span class="kvittering-name">${navn}</span><br><br>Vis dette til personalet ved afhentning.`
  )

  loadUdstyr()
}

// ── KVITTERING ─────────────────────────────────────────
function visKvittering(titel, tekst) {
  document.getElementById('kv-title').textContent = titel
  document.getElementById('kv-body').innerHTML = tekst
  document.getElementById('kvittering-overlay').classList.add('show')
}

window.lukKvittering = function() {
  document.getElementById('kvittering-overlay').classList.remove('show')
}

// ── TOAST ──────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2500)
}

async function checkMedlemskab() {
  const { data } = await supabase
    .from('spillere')
    .select('medlem, ansøgt')
    .ilike('navn', aktivtNavn)
    .single()

  const container = document.getElementById('medlemskab-status')
  if (!container) return

  if (data?.medlem) {
    container.innerHTML = '<span class="badge badge-green">✓ DU ER MEDLEM</span>'
  } else if (data?.ansøgt) {
    container.innerHTML = '<span class="badge badge-dim">ANSØGNING AFVENTER GODKENDELSE</span>'
  } else {
    container.innerHTML = '<button class="btn" onclick="ansøgMedlemskab()">Ansøg om medlemskab</button>'
  }
}

window.ansøgMedlemskab = async function() {
  const { data: existing } = await supabase
    .from('spillere')
    .select('id')
    .ilike('navn', aktivtNavn)
    .single()

  if (existing) {
    await supabase.from('spillere').update({ ansøgt: true }).eq('id', existing.id)
  } else {
    await supabase.from('spillere').insert({ navn: aktivtNavn, medlem: false, tilmeldt: false, ansøgt: true })
  }

  toast('✓ ANSØGNING SENDT')
  checkMedlemskab()
}

// ── INIT ───────────────────────────────────────────────
loadEvents()
loadUdstyr()
checkMedlemskab()
</script>
</body>
</html>
